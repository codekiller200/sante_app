name: mediremind
description: Application mobile de rappel de médicaments
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- Base de données locale ---
  sqflite: ^2.3.2
  path: ^1.9.0

  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.9


  # --- Notifications & alarmes ---
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4

  # --- Navigation ---
  go_router: ^13.0.0

  # --- Gestion d'état ---
  provider: ^6.1.2

  # --- Sécurité ---
  crypto: ^3.0.3

  # --- UI & internationalisation ---
  intl: ^0.20.2
  flutter_svg: ^2.0.10
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  flutter_localizations:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/MediRemind_logo.png"
  min_sdk_android: 26
  adaptive_icon_background: "#0A2540"   # fond bleu pour Android 8+
  adaptive_icon_foreground: "assets/images/MediRemind_logo_1024.png"

flutter_native_splash:
  color: "#0A2540"
  image: assets/images/MediRemind_logo.png
  android: true
  ios: true
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
